services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/salamtak
      JWT_SECRET: change-this-secret
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      VITE_API_URL: http://localhost:5000/api

volumes:
  mongo-data:
